<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hector Hosting - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #1e3a8a;
            --primary-light-blue: #3b82f6;
            --accent-blue: #0ea5e9;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-light: #e2e8f0;
            --text-gray: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .admin-container {
            background: var(--card-bg);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.1);
        }

        .admin-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .admin-header h1 {
            color: var(--accent-blue);
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .admin-header p {
            color: var(--text-gray);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--text-light);
            padding: 0.75rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.2);
        }

        .admin-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .admin-buttons button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--primary-light-blue), var(--accent-blue));
            color: white;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .back-btn {
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-light);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .back-btn:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .message {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .plans-list {
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .plan-item {
            background: var(--dark-bg);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .plan-item-info strong {
            color: var(--accent-blue);
        }

        .plan-item-actions button {
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            margin-left: 0.5rem;
            transition: color 0.3s;
            font-size: 1rem;
            padding: 0.25rem 0.5rem;
        }

        .plan-item-actions button:hover {
            color: var(--accent-blue);
        }

        .admin-content {
            display: none;
        }

        .admin-content.show {
            display: block;
        }

        .login-form.hide {
            display: none;
        }

        h3 {
            color: var(--accent-blue);
            margin: 2rem 0 1rem 0;
            font-size: 1.3rem;
        }

        .back-home {
            text-align: center;
            margin-top: 2rem;
        }

        .back-home a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-home a:hover {
            color: var(--primary-light-blue);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Hector Admin Panel</h1>
            <p>Manage your hosting plans and services</p>
        </div>

        <div id="message" class="message"></div>

        <!-- Login Form -->
        <div class="login-form" id="loginForm">
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="adminPassword" placeholder="Enter admin password" autofocus>
            </div>
            <div class="admin-buttons">
                <button class="login-btn" onclick="authenticateAdmin()">Login</button>
                <button class="back-btn" onclick="goHome()">Back Home</button>
            </div>
        </div>

        <!-- Admin Content -->
        <div class="admin-content" id="adminContent">
            <h3>📋 Add New Plan</h3>
            
            <div class="form-group">
                <label>Plan Name</label>
                <input type="text" id="planName" placeholder="e.g., Starter Plan">
            </div>
            
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="planPrice" placeholder="e.g., 99" step="0.01">
            </div>
            
            <div class="form-group">
                <label>Billing Period</label>
                <input type="text" id="planPeriod" placeholder="e.g., /month">
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="planDescription" placeholder="Brief description of the plan" rows="2"></textarea>
            </div>
            
            <div class="form-group">
                <label>Features (comma-separated)</label>
                <textarea id="planFeatures" placeholder="e.g., 10GB Storage, 100GB Bandwidth, 24/7 Support" rows="3"></textarea>
            </div>
            
            <div class="admin-buttons">
                <button class="login-btn" onclick="addPlan()" style="flex: 1;">Add Plan</button>
            </div>

            <h3>⚙️ Manage Plans</h3>
            <div class="plans-list" id="managePlans">
                <!-- Plans list will be shown here -->
            </div>

            <div class="admin-buttons">
                <button class="back-btn" onclick="logout()">Logout</button>
            </div>

            <div class="back-home">
                <a href="/">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_PASSWORD = "admin123"; // Change this to something secure!

        // Default plans
        const defaultPlans = [
            {
                id: 1,
                name: "Starter",
                price: 99,
                period: "/month",
                description: "Perfect for small projects",
                popular: false,
                features: ["10GB Storage", "100GB Bandwidth", "1 Email Account", "24/7 Support"]
            },
            {
                id: 2,
                name: "Professional",
                price: 199,
                period: "/month",
                description: "For growing businesses",
                popular: true,
                features: ["50GB Storage", "500GB Bandwidth", "10 Email Accounts", "24/7 Priority Support", "Free SSL"]
            },
            {
                id: 3,
                name: "Enterprise",
                price: 499,
                period: "/month",
                description: "For large-scale operations",
                popular: false,
                features: ["Unlimited Storage", "Unlimited Bandwidth", "Unlimited Emails", "24/7 Dedicated Support", "Free SSL", "Custom Domain"]
            },
            {
                id: 4,
                name: "VPS",
                price: 299,
                period: "/month",
                description: "Full server control",
                popular: false,
                features: ["4GB RAM", "100GB SSD", "2 CPU Cores", "Root Access", "Unlimited Bandwidth"]
            }
        ];

        // Load plans from localStorage or use defaults
        function loadPlans() {
            const stored = localStorage.getItem('hectorPlans');
            return stored ? JSON.parse(stored) : defaultPlans;
        }

        // Save plans to localStorage
        function savePlans(plans) {
            localStorage.setItem('hectorPlans', JSON.stringify(plans));
        }

        // Show message
        function showMessage(text, type = 'error') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 4000);
        }

        // Authenticate
        function authenticateAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === DEFAULT_PASSWORD) {
                document.getElementById('loginForm').classList.add('hide');
                document.getElementById('adminContent').classList.add('show');
                renderManagePlans();
            } else {
                showMessage('❌ Incorrect password!', 'error');
                document.getElementById('adminPassword').value = '';
            }
        }

        // Add new plan
        function addPlan() {
            const name = document.getElementById('planName').value.trim();
            const price = parseFloat(document.getElementById('planPrice').value);
            const period = document.getElementById('planPeriod').value.trim();
            const description = document.getElementById('planDescription').value.trim();
            const featuresText = document.getElementById('planFeatures').value;
            const features = featuresText.split(',').map(f => f.trim()).filter(f => f);

            if (!name || !price || !period || !description || !features.length) {
                showMessage('❌ Please fill all fields!', 'error');
                return;
            }

            const plans = loadPlans();
            const newPlan = {
                id: Math.max(...plans.map(p => p.id), 0) + 1,
                name,
                price,
                period,
                description,
                popular: false,
                features
            };

            plans.push(newPlan);
            savePlans(plans);

            // Clear form
            document.getElementById('planName').value = '';
            document.getElementById('planPrice').value = '';
            document.getElementById('planPeriod').value = '';
            document.getElementById('planDescription').value = '';
            document.getElementById('planFeatures').value = '';

            renderManagePlans();
            showMessage('✅ Plan added successfully!', 'success');
        }

        // Render manage plans
        function renderManagePlans() {
            const plans = loadPlans();
            const container = document.getElementById('managePlans');
            
            if (plans.length === 0) {
                container.innerHTML = '<p style="color: var(--text-gray); text-align: center;">No plans yet. Add one above!</p>';
                return;
            }

            container.innerHTML = plans.map(plan => `
                <div class="plan-item">
                    <div class="plan-item-info">
                        <strong>${plan.name}</strong> - ₹${plan.price.toLocaleString()}${plan.period}
                        ${plan.popular ? ' <span style="color: var(--accent-blue); font-size: 0.8rem; margin-left: 0.5rem;">⭐ POPULAR</span>' : ''}
                    </div>
                    <div class="plan-item-actions">
                        <button onclick="togglePopular(${plan.id})" title="Toggle Popular">⭐</button>
                        <button onclick="deletePlan(${plan.id})" title="Delete">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // Toggle popular
        function togglePopular(id) {
            const plans = loadPlans();
            plans.forEach(p => p.popular = p.id === id ? !p.popular : false);
            savePlans(plans);
            renderManagePlans();
            showMessage('✅ Plan updated!', 'success');
        }

        // Delete plan
        function deletePlan(id) {
            if (confirm('Are you sure you want to delete this plan?')) {
                const plans = loadPlans();
                const filtered = plans.filter(p => p.id !== id);
                savePlans(filtered);
                renderManagePlans();
                showMessage('✅ Plan deleted successfully!', 'success');
            }
        }

        // Logout
        function logout() {
            document.getElementById('loginForm').classList.remove('hide');
            document.getElementById('adminContent').classList.remove('show');
            document.getElementById('adminPassword').value = '';
            document.getElementById('message').style.display = 'none';
        }

        // Go home
        function goHome() {
            window.location.href = '/';
        }

        // Check if already authenticated (for demo purposes)
        const params = new URLSearchParams(window.location.search);
        if (params.get('authenticated') === 'true') {
            authenticateAdmin();
        }

        // Allow Enter key to login
        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                authenticateAdmin();
            }
        });
    </script>
</body>
</html>
